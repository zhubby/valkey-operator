# Optional deployment overlay that exposes the manager's Axum management API.
namespace: valkey-operator-system
namePrefix: valkey-operator-

resources:
- ../crd
- ../rbac
- ../manager
- metrics_service.yaml
- service.yaml

patches:
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment
- path: manager_management_api_patch.yaml
  target:
    kind: Deployment
